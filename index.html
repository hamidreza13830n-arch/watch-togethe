<!DOCTYPE html>  
<html>  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">  
<title>Watch Together</title>  
  
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>  
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>  
  
<style>  
*{box-sizing:border-box;margin:0;padding:0}  
html,body{height:100%}  

/* ========================= */
/* 🎨 THEMES (4 animated)    */
/* ========================= */
body{
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
min-height:100dvh;
overflow:hidden;
background:linear-gradient(-45deg,#1f1c2c,#928dab,#0f2027,#2c5364);
background-size:400% 400%;
animation:bg 12s ease infinite;

/* ✅ NEW: make background layers (shapes) render correctly */
position:relative;
isolation:isolate;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Theme 1 (Default: Neon Night) */
body.theme1{
background:linear-gradient(-45deg,#1f1c2c,#928dab,#0f2027,#2c5364);
background-size:420% 420%;
animation:t1 12s ease infinite;
}
@keyframes t1{
0%{background-position:0% 40%}
50%{background-position:100% 60%}
100%{background-position:0% 40%}
}

/* Theme 2 (Aurora) */
body.theme2{
background:linear-gradient(-45deg,#061a2d,#00c9ff,#92fe9d,#6a11cb);
background-size:500% 500%;
animation:t2 14s ease infinite;
}
@keyframes t2{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Theme 3 (Cyber Sunset) */
body.theme3{
background:linear-gradient(-45deg,#12001b,#ff006e,#8338ec,#00f5d4);
background-size:480% 480%;
animation:t3 13s ease infinite;
}
@keyframes t3{
0%{background-position:10% 50%}
50%{background-position:90% 55%}
100%{background-position:10% 50%}
}

/* Theme 4 (Deep Ocean) */
body.theme4{
background:linear-gradient(-45deg,#000428,#004e92,#00c6ff,#0072ff);
background-size:520% 520%;
animation:t4 15s ease infinite;
}
@keyframes t4{
0%{background-position:0% 55%}
50%{background-position:100% 45%}
100%{background-position:0% 55%}
}

/* ✅ UPDATED: stronger telegram-like shapes for theme 2 & 3 (visible) */
body.theme2::after,
body.theme3::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:
  radial-gradient(circle at 18% 28%, rgba(255,255,255,.10) 0%, transparent 42%),
  radial-gradient(circle at 82% 68%, rgba(255,255,255,.08) 0%, transparent 48%),
  radial-gradient(circle at 52% 52%, rgba(255,255,255,.07) 0%, transparent 62%),
  radial-gradient(circle at 30% 75%, rgba(255,255,255,.09) 0%, transparent 58%),
  radial-gradient(circle at 70% 22%, rgba(255,255,255,.06) 0%, transparent 55%),

  radial-gradient(circle, rgba(255,255,255,.08) 1px, transparent 1.2px);
background-size:
  auto, auto, auto, auto, auto,
  26px 26px;
opacity:.75;
mix-blend-mode:overlay;
filter: blur(.2px);
z-index:1;
animation:shapeMove 18s ease-in-out infinite;
}
@keyframes shapeMove{
0%{transform:translateY(0) translateX(0)}
50%{transform:translateY(-18px) translateX(10px)}
100%{transform:translateY(0) translateX(0)}
}

body.dark{background:#0b0b12}

/* 🎄 SMALL CHRISTMAS LIGHTS */  
.light-wrapper{  
position:relative;  
width:100%;  
height:36px;  
flex-shrink:0;  
overflow:hidden;  
}  
.light-wire{  
position:absolute;  
top:8px;  
left:0;  
width:100%;  
height:28px;  
}  
.light-wire svg{  
width:100%;  
height:100%;  
}  
.bulb{  
position:absolute;  
width:9px;  
height:13px;  
border-radius:50% 50% 45% 45%;  
animation:blink 1.4s infinite alternate ease-in-out;  
box-shadow:0 0 6px currentColor,0 0 12px currentColor;  
}  
.bulb::before{  
content:"";  
position:absolute;  
top:-3px;  
left:50%;  
transform:translateX(-50%);  
width:5px;  
height:4px;  
background:#222;  
border-radius:2px;  
}  
@keyframes blink{  
0%{opacity:1;transform:scale(1)}  
100%{opacity:.5;transform:scale(.85)}  
}  
body.dark .light-wrapper{  
opacity:0;  
pointer-events:none;  
}  
/* END LIGHTS */  

.glass{  
background:rgba(255,255,255,.08);  
backdrop-filter:blur(12px);  
border:1px solid rgba(255,255,255,.1);  
border-radius:18px;  
}  
  
header{  
height:42px;  
flex-shrink:0;  
display:flex;  
justify-content:space-between;  
align-items:center;  
padding:0 12px;  
}  

.main{  
flex:1;  
display:flex;  
flex-direction:column;  
padding:8px;  
gap:8px;  
overflow:hidden;  
}

/* ✅ NEW: ensure content stays above shapes layer */
header, .main, #settings, #login, #welcomeOverlay{
position:relative;
z-index:2;
}

.video-container{  
flex:0 0 40%;  
padding:10px;  
display:flex;  
flex-direction:column;  
position:relative;  
overflow:hidden;  
}  

/* ✅ NEW: create a little space below video so the button is NOT on the video frame */
.video-container{padding:10px 10px 54px 10px;}

video{  
width:100%;  
flex:1;  
border-radius:12px;  
}  

/********************/
/* 🎭 REAL CURTAIN  */
/********************/
#curtain{  
position:absolute;  
inset:10px;  
border-radius:12px;  
z-index:10;  
pointer-events:none;  
display:flex;  
overflow:hidden;  
}  

/* ✅ NEW: keep curtain only on video area (not the bottom button zone) */
#curtain{inset:10px 10px 54px 10px;}

#curtain .side{  
width:50%;  
height:100%;  
background:repeating-linear-gradient(90deg,#7a0000 0px,#b30000 20px,#7a0000 40px);  
box-shadow: inset 0 0 40px rgba(0,0,0,.6);  
transition:transform 1.6s cubic-bezier(.77,0,.18,1);  
}  
#curtain.open .left{transform:translateX(-105%)}  
#curtain.open .right{transform:translateX(105%)}  
#curtain.hide{display:none}  

/* 🥇 GOLD BAR */
#curtain::before{  
content:"";  
position:absolute;  
top:0; left:0;  
width:100%; height:14px;  
background:linear-gradient(90deg,#caa400,#ffd700,#fff3a0,#ffd700,#caa400);  
box-shadow:0 2px 8px rgba(255,215,0,.6), inset 0 -2px 4px rgba(0,0,0,.35);  
z-index:20;  
}  

/* 🎉 EMOJI OVERLAY ON VIDEO */
#videoEmoteLayer{
position:absolute;
inset:10px;
border-radius:12px;
pointer-events:none;
z-index:11;
overflow:hidden;
}

/* ✅ NEW: keep emote layer only on video area (not the bottom button zone) */
#videoEmoteLayer{inset:10px 10px 54px 10px;}

.fly-emo{
position:absolute;
font-size:34px;
filter: drop-shadow(0 6px 10px rgba(0,0,0,.45));
opacity:0;
animation:flyEmo 1.2s ease-out forwards;
}
@keyframes flyEmo{
0%{transform:translateX(-20px) translateY(0) scale(.9); opacity:0}
15%{opacity:1}
100%{transform:translateX(260px) translateY(-40px) scale(1.15); opacity:0}
}

/* 🟢 ONLINE DOT */
#onlineDot{
width:8px;
height:8px;
border-radius:50%;
background:#00ff66;
box-shadow:0 0 6px #00ff66;
animation:blinkOnline 1s infinite;
}
@keyframes blinkOnline{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

.chat-container{  
flex:1;  
padding:10px;  
display:flex;  
flex-direction:column;  
min-height:0;  
}  

.chat-box{  
flex:1;  
overflow-y:auto;  
display:flex;  
flex-direction:column;  
gap:6px;  
}  

.message{  
padding:8px 10px;  
border-radius:14px;  
max-width:75%;  
font-size:14px;  
display:flex;  
flex-direction:column;  
gap:4px;  
position:relative;  
}  
.me{align-self:flex-end;background:#0088ff;border-bottom-right-radius:4px}  
.other{align-self:flex-start;background:#2a2a32;border-bottom-left-radius:4px}  

.meta{  
font-size:10px;  
opacity:.7;  
display:flex;  
justify-content:flex-end;  
gap:4px;  
align-items:center;  
flex-wrap:wrap;  
}  

.reply-box{  
font-size:11px;  
opacity:.8;  
border-left:3px solid #fff;  
padding-left:6px;  
margin-bottom:4px;  
}  

.reactions{  
display:flex;  
gap:4px;  
font-size:14px;  
margin-top:4px;  
}  

.reaction-picker{  
position:absolute;  
bottom:100%;  
background:#1c1c22;  
padding:6px;  
border-radius:10px;  
display:flex;  
gap:6px;  
font-size:18px;  
align-items:center;  
}  

.react-btn{  
font-size:11px;  
opacity:.9;  
padding:2px 5px;  
border-radius:8px;  
border:1px solid rgba(255,255,255,.25);  
background:rgba(0,0,0,.15);  
cursor:pointer;  
user-select:none;  
}  
.react-btn:active{transform:scale(.96)}  

.edit-btn{  
font-size:11px;  
opacity:.9;  
padding:2px 5px;  
border-radius:8px;  
border:1px solid rgba(255,255,255,.25);  
background:rgba(0,0,0,.15);  
cursor:pointer;  
user-select:none;  
}  
.edit-btn:active{transform:scale(.96)}  

/* ✅ DELETE BUTTON (my msgs) */
.del-btn{
font-size:11px;
opacity:.9;
padding:2px 5px;
border-radius:8px;
border:1px solid rgba(255,255,255,.25);
background:rgba(0,0,0,.15);
cursor:pointer;
user-select:none;
}
.del-btn:active{transform:scale(.96)}

.picker-close{  
font-size:12px;  
padding:2px 6px;  
border-radius:8px;  
border:1px solid rgba(255,255,255,.25);  
background:rgba(255,255,255,.08);  
cursor:pointer;  
user-select:none;  
}

/* ✅✅✅ GAME MODE CSS (اضافه شد - حذف نشده هیچ چیز) ✅✅✅ */
#gameBox{
  display:none;
  width:100%;
  height:100%;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}

#board{
  width:100%;
  max-width:420px;
  aspect-ratio:1;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:2px;
  background:#ffcc70;
  padding:6px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.cell{
  background:#fff8dc;
  border-radius:6px;
  font-size:10px;
  display:flex;
  align-items:flex-start;
  justify-content:flex-end;
  padding:2px;
  position:relative;
}

.token{
  position:absolute;
  bottom:4px;
  left:4px;
  width:18px;
  height:18px;
  border-radius:50%;
}

.p1{ background:#ff4d6d; }
.p2{ background:#3a86ff; }

#rollDiceBtn, #resetGameBtn{
  padding:8px 14px;
  border:none;
  border-radius:14px;
  background:#ff4d6d;
  color:white;
  font-weight:bold;
}

/* ✅ UPDATED: landscape layout fix (video not dropping down) */
@media (orientation:landscape){  
  .main{
    flex-direction:row;
    align-items:flex-start;   /* ✅ stick to top */
  }  
  .video-container{
    flex:0 0 60%;
    margin-top:-10px;         /* ✅ move video slightly up */
  }  
  .chat-container{
    margin-top:-10px;         /* ✅ keep aligned (remove if you don't want chat up) */
  }
}  
</style>  
</head>

<script>  
/* 🎄 CREATE SMALL BULBS */  
const colors=["#ff2d2d","#ffd400","#00ff88","#00aaff","#ff66ff"];  
const wrapper=document.querySelector(".light-wrapper");  

for(let i=0;i<30;i++){  
let bulb=document.createElement("div");  
bulb.className="bulb";  
bulb.style.left=(i*3.4)+"%";  
bulb.style.top=(14+Math.sin(i)*4)+"px";  
bulb.style.color=colors[Math.floor(Math.random()*colors.length)];  
bulb.style.animationDelay=(Math.random()*2)+"s";  
wrapper.appendChild(bulb);  
}  

setInterval(()=>{  
document.querySelectorAll(".bulb").forEach(b=>{  
b.style.color=colors[Math.floor(Math.random()*colors.length)];  
});  
},2000);  
</script>

apiKey:"AIzaSyCDHmmKIYPHDyvx4BXTb-7VP6lmVb8BCYw",

var db=firebase.database();  

var username="user"+Math.floor(Math.random()*1000);  
var myId=Math.random().toString(36).substr(2,9);  
var replyTo=null;

/*****************************/
/* 🎨 THEME SYSTEM           */
/*****************************/
function applyTheme(t){
  document.body.classList.remove("theme1","theme2","theme3","theme4");
  document.body.classList.add(t);
}
function setTheme(t){
  applyTheme(t);
  try{localStorage.setItem("wt_theme",t);}catch(e){}
  db.ref("ui/theme").set(t);
}
(function(){
  var t=null;
  try{t=localStorage.getItem("wt_theme");}catch(e){}
  if(t) applyTheme(t); else applyTheme("theme1");
})();

db.ref("ui/theme").on("value",snap=>{
  var t=snap.val();
  if(t) applyTheme(t);
});

/*****************************/
/* ✅ LOGIN / WELCOME        */
/*****************************/
function checkPass(){  
  var input=document.getElementById("pass").value.trim();  
  if(input==="bazsho20"){  
    document.getElementById("login").style.display="none";  
    document.getElementById("welcomeOverlay").style.display="flex";  
  }  
}  
function closeWelcome(){welcomeOverlay.style.display="none"}  
function toggleSettings(){settings.classList.toggle("open")}  
function toggleDark(){document.body.classList.toggle("dark")}  

/*****************************/
/* 🎉 VIDEO REACTION PANEL ✅ */
/*****************************/
var __videoPanel=document.getElementById("videoReactPanel");
var __videoBtn=document.getElementById("videoReactBtn");

function closeVideoPanel(){
  if(__videoPanel) __videoPanel.style.display="none";
}

__videoBtn.addEventListener("click",function(e){
  e.stopPropagation();
  if(!__videoPanel) return;
  __videoPanel.style.display=(__videoPanel.style.display==="none" || !__videoPanel.style.display) ? "block" : "none";
});

document.addEventListener("click",function(){
  closeVideoPanel();
});

/*****************************/
/* 🎉 LIVE EMOTES (overlay + sync) */
/*****************************/
function spawnVideoEmote(emoji){
  var layer=document.getElementById("videoEmoteLayer");
  if(!layer)return;
  var el=document.createElement("div");
  el.className="fly-emo";
  el.innerText=emoji;

  var top=12 + Math.floor(Math.random()* (layer.clientHeight-60));
  el.style.left="8px";
  el.style.top=top+"px";

  layer.appendChild(el);
  void el.offsetWidth;
  el.style.animationDuration=(1.0 + Math.random()*0.4)+"s";

  setTimeout(()=>{ try{el.remove();}catch(e){} },1500);
}

function sendLiveEmote(emoji){
  spawnVideoEmote(emoji);
  db.ref("video/emotes").push({
    e:emoji,
    user:username,
    ts:Date.now()
  });
  closeVideoPanel(); /* ✅ auto close after click */
}

/* listen for others */
db.ref("video/emotes").limitToLast(30).on("child_added",snap=>{
  var d=snap.val();
  if(!d)return;
  if(d.user===username) return;
  spawnVideoEmote(d.e);
});

/*****************************/
/* 🎬 VIDEO LINK             */
/*****************************/
function setVideoLink(){  
  var link=document.getElementById("videoLinkInput").value;  
  if(!link)return;  
  db.ref("video/url").set(link);  
  videoLinkInput.value="";  
  toggleSettings();  
}  
db.ref("video/url").on("value",snap=>{  
  if(snap.val())video.src=snap.val();  
});  

/*****************************/
/* 🎭 CURTAIN HELPERS        */
/*****************************/
function curtainReset(){  
  var c=document.getElementById("curtain");  
  if(!c)return;  
  c.classList.remove("hide");  
  c.classList.remove("open");  
}  
function curtainOpenAndGo(){  
  var c=document.getElementById("curtain");  
  if(!c)return;  
  c.classList.remove("hide");  
  c.classList.remove("open");  
  setTimeout(()=>{ c.classList.add("open"); },60);  
  setTimeout(()=>{ c.classList.add("hide"); },1750);  
}  
</script>
<script>
/* ===================== */  
/* ✅ VIDEO SYNC ADDED ✅ */  
/* ===================== */  
var vid=document.getElementById("video");  
var isSyncing=false;  
var lastSeekSend=0;  

function pushState(state){  
  db.ref("video/state").set(state);  
}  

vid.addEventListener("play",()=>{  
  curtainOpenAndGo();  
  if(isSyncing)return;  
  pushState({action:"play",time:vid.currentTime,rate:vid.playbackRate,ts:Date.now()});  
});  

vid.addEventListener("pause",()=>{  
  curtainReset();  
  if(isSyncing)return;  
  pushState({action:"pause",time:vid.currentTime,rate:vid.playbackRate,ts:Date.now()});  
});  

vid.addEventListener("seeked",()=>{  
  curtainOpenAndGo();  
  if(isSyncing)return;  
  var now=Date.now();  
  if(now-lastSeekSend<250)return;  
  lastSeekSend=now;  
  pushState({action:"seek",time:vid.currentTime,rate:vid.playbackRate,ts:now});  
});  

vid.addEventListener("ratechange",()=>{  
  if(isSyncing)return;  
  pushState({action:"rate",time:vid.currentTime,rate:vid.playbackRate,ts:Date.now()});  
});  

db.ref("video/state").on("value",snap=>{  
  var s=snap.val();  
  if(!s)return;  
  isSyncing=true;  

  if(typeof s.rate==="number" && vid.playbackRate!==s.rate){  
    vid.playbackRate=s.rate;  
  }  

  if(typeof s.time==="number" && Math.abs(vid.currentTime-s.time)>0.6){  
    try{vid.currentTime=s.time;}catch(e){}  
  }  

  if(s.action==="seek"){ curtainOpenAndGo(); }  

  if(s.action==="play"){  
    var p=vid.play();  
    if(p && p.catch)p.catch(()=>{});  
  }  
  if(s.action==="pause"){ vid.pause(); }  

  setTimeout(()=>{isSyncing=false;},300);  
});  
/* ===== END SYNC ===== */  

/* 🟢 PROFESSIONAL ONLINE SYSTEM */
var connectedRef = db.ref(".info/connected");
connectedRef.on("value", function(snap) {
  if (snap.val() === true) {
    var con = db.ref("online/" + myId);
    con.set({user: username, ts: Date.now()});
    con.onDisconnect().remove();
  }
});
db.ref("online").on("value", snap => {
  var count = 0;
  snap.forEach(child => { if(child.val()) count++; });
  document.getElementById("online").innerText = "Online: " + count;
});

/*****************************/
/* ✅ REPLY PREVIEW SYSTEM ✅ */
/*****************************/
function setReply(text){  
  replyTo=text;  
  var box=document.getElementById("replyPreview");  
  var t=document.getElementById("replyPreviewText");  
  t.innerText=text;  
  box.style.display="block";  
  try{msg.focus();}catch(e){}  
}  
function cancelReply(){  
  replyTo=null;  
  var box=document.getElementById("replyPreview");  
  box.style.display="none";  
  document.getElementById("replyPreviewText").innerText="";  
}  

/****************************/
/* ✅ EDIT MESSAGE SYSTEM ✅ */
/****************************/
function setEdit(key,oldText){  
  editKey=key;  
  document.getElementById("editPreviewText").innerText=oldText;  
  document.getElementById("editPreview").style.display="block";  
  msg.value=oldText;  
  try{msg.focus();}catch(e){}  
  cancelReply();  
}  
function cancelEdit(){  
  editKey=null;  
  document.getElementById("editPreview").style.display="none";  
  document.getElementById("editPreviewText").innerText="";  
  msg.value="";  
}  

/*****************************/
/* ✅ TYPING INDICATOR ✅     */
/*****************************/
function setTyping(isTyping){  
  db.ref("typing/"+myId).set(isTyping?{user:username,typing:true,ts:Date.now()}:null);  
}  
db.ref("typing/"+myId).onDisconnect().remove();  

var typingTimer=null;  
msg.addEventListener("input",()=>{  
  setTyping(true);  
  if(typingTimer)clearTimeout(typingTimer);  
  typingTimer=setTimeout(()=>{setTyping(false);},900);  
});  
msg.addEventListener("blur",()=>{setTyping(false);});  

db.ref("typing").on("value",snap=>{  
  var names=[];  
  snap.forEach(c=>{  
    if(c.key!==myId && c.val() && c.val().typing){  
      names.push(c.val().user||"someone");  
    }  
  });  
  var box=document.getElementById("typingIndicator");  
  if(names.length){  
    box.style.display="block";  
    box.innerText=(names.length===1?names[0]:"چند نفر")+" در حال تایپ...";  
  }else{  
    box.style.display="none";  
    box.innerText="";  
  }  
});  

/*****************************/
/* ✅ CLOSE ANY OPEN PICKER ✅ */
/*****************************/
function closeAllPickers(){  
  document.querySelectorAll(".reaction-picker").forEach(p=>p.remove());  
}  
document.addEventListener("click",()=>{closeAllPickers();});  

/*****************************/
/* ✅ SEND (device removed)  */
/*****************************/
function send(){  
  if(!msg.value)return;  

  if(editKey){  
    db.ref("chat/"+editKey+"/text").set(msg.value);  
    db.ref("chat/"+editKey+"/edited").set(true);  
    msg.value="";  
    cancelEdit();  
    setTyping(false);  
    return;  
  }  

  db.ref("chat").push({  
    text:msg.value,  
    user:username,  
    time:Date.now(),  
    reply:replyTo,  
    seen:false,  
    edited:false,  
    reactions:{}  
  });  
  msg.value="";  
  cancelReply();  
  setTyping(false);  
}  

/********************************************/
/* ✅ DOUBLE TAP / DOUBLE CLICK TO REPLY ✅ */
/********************************************/
var lastTapTimeByKey={};  
function attachReplyHandlers(div,key,text){  
  div.addEventListener("dblclick",function(e){  
    e.stopPropagation();  
    setReply(text);  
  });  
  div.addEventListener("touchend",function(e){  
    var now=Date.now();  
    var last=lastTapTimeByKey[key]||0;  
    lastTapTimeByKey[key]=now;  
    if(now-last<320){  
      try{e.preventDefault();}catch(err){}  
      setReply(text);  
    }  
  },{passive:false});  
}  

/*****************************/
/* ✅ DELETE SINGLE MESSAGE ✅ */
/*****************************/
function deleteMessage(key){
  db.ref("chat/"+key).remove();
}

/*****************************/
/* ✅ CHAT RENDER            */
/*****************************/
db.ref("chat").on("child_added",snap=>{  
  var d=snap.val();  
  var key=snap.key;  

  if(d.user!==username){  
    db.ref("chat/"+key+"/seen").set(true);  
  }  

  var div=document.createElement("div");  
  div.className="message "+(d.user===username?"me":"other");  
  div.id="m_"+key;  

  if(d.reply){  
    var rep=document.createElement("div");  
    rep.className="reply-box";  
    rep.innerText=d.reply;  
    div.appendChild(rep);  
  }  

  var text=document.createElement("div");  
  text.innerText=d.text;  
  div.appendChild(text);  

  var meta=document.createElement("div");  
  meta.className="meta";  

  var reactBtn=document.createElement("span");  
  reactBtn.className="react-btn";  
  reactBtn.innerText="😊";  
  reactBtn.onclick=function(ev){  
    ev.stopPropagation();  
    closeAllPickers();  
    showReactions(key,div);  
  };  

  if(d.user===username){  
    var editBtn=document.createElement("span");  
    editBtn.className="edit-btn";  
    editBtn.innerText="✎";  
    editBtn.onclick=function(ev){  
      ev.stopPropagation();  
      closeAllPickers();  
      setEdit(key,d.text);  
    };  

    var delBtn=document.createElement("span");
    delBtn.className="del-btn";
    delBtn.innerText="🗑";
    delBtn.onclick=function(ev){
      ev.stopPropagation();
      if(confirm("پیام حذف بشه؟")){
        deleteMessage(key);
      }
    };
  }  

  meta.innerHTML=new Date(d.time).toLocaleTimeString().slice(0,5)  
  +(d.edited?" <span style='opacity:.75'>(edited)</span>":"")  
  +(d.user===username?" <span id='s"+key+"'>✔</span>":"");  

  if(d.user===username){  
    meta.appendChild(editBtn);  
    meta.appendChild(delBtn);
  }  
  meta.appendChild(reactBtn);  
  div.appendChild(meta);  

  var react=document.createElement("div");  
  react.className="reactions";  
  div.appendChild(react);  

  div.onclick=function(e){ e.stopPropagation(); };  
  attachReplyHandlers(div,key,d.text);  

  chat.appendChild(div);  
  chat.scrollTop=chat.scrollHeight;  

  if(d.user===username){  
    db.ref("chat/"+key+"/seen").on("value",s=>{  
      var el=document.getElementById("s"+key);
      if(el) el.innerText=s.val()?"✔✔":"✔";  
    });  
  }  
});  

db.ref("chat").on("child_removed",snap=>{
  var el=document.getElementById("m_"+snap.key);
  if(el) el.remove();
});

/*****************************/
/* ✅ REACTIONS PICKER       */
/*****************************/
function showReactions(key,div){  
  if(div.querySelector(".reaction-picker"))return;  
  var picker=document.createElement("div");  
  picker.className="reaction-picker";  

  var close=document.createElement("span");  
  close.className="picker-close";  
  close.innerText="✕";  
  close.onclick=function(ev){  
    ev.stopPropagation();  
    picker.remove();  
  };  
  picker.appendChild(close);  

  ["😍","😎","🤣","🩷","👌","😭","😡","🔥","😜"].forEach(e=>{  
    var span=document.createElement("span");  
    span.innerText=e;  
    span.onclick=function(ev){  
      ev.stopPropagation();  
      db.ref("chat/"+key+"/reactions/"+myId).set(e);  
      picker.remove();  
    };  
    picker.appendChild(span);  
  });  
  div.appendChild(picker);  
}  

db.ref("chat").on("child_changed",snap=>{  
  var d=snap.val();  
  var m=document.getElementById("m_"+snap.key);  
  if(m){  
    var mainText=m.querySelector("div:nth-child("+(d.reply?2:1)+")");  
    if(mainText) mainText.innerText=d.text;  

    var meta=m.querySelector(".meta");  
    if(meta){  
      var timeStr=new Date(d.time).toLocaleTimeString().slice(0,5);  
      var editedStr=d.edited?" <span style='opacity:.75'>(edited)</span>":"";  
      if(d.user===username){  
        meta.innerHTML=timeStr+editedStr+" <span id='s"+snap.key+"'>"+(d.seen?"✔✔":"✔")+"</span>";  

        var editBtn=document.createElement("span");  
        editBtn.className="edit-btn";  
        editBtn.innerText="✎";  
        editBtn.onclick=function(ev){  
          ev.stopPropagation();  
          closeAllPickers();  
          setEdit(snap.key,d.text);  
        };  

        var delBtn=document.createElement("span");
        delBtn.className="del-btn";
        delBtn.innerText="🗑";
        delBtn.onclick=function(ev){
          ev.stopPropagation();
          if(confirm("پیام حذف بشه؟")){
            deleteMessage(snap.key);
          }
        };

        meta.appendChild(editBtn);  
        meta.appendChild(delBtn);

        var reactBtn=document.createElement("span");  
        reactBtn.className="react-btn";  
        reactBtn.innerText="😊";  
        reactBtn.onclick=function(ev){  
          ev.stopPropagation();  
          closeAllPickers();  
          showReactions(snap.key,m);  
        };  
        meta.appendChild(reactBtn);  
      }else{  
        meta.innerHTML=timeStr+editedStr;  
        var reactBtn=document.createElement("span");  
        reactBtn.className="react-btn";  
        reactBtn.innerText="😊";  
        reactBtn.onclick=function(ev){  
          ev.stopPropagation();  
          closeAllPickers();  
          showReactions(snap.key,m);  
        };  
        meta.appendChild(reactBtn);  
      }  
    }  
  }  

  var react=document.querySelector("#m_"+snap.key+" .reactions");  
  if(react){  
    react.innerHTML="";  
    if(d.reactions){  
      Object.values(d.reactions).forEach(e=>{  
        react.innerHTML+=e+" ";  
      });  
    }  
  }  
});  

/*****************************/
/* ✅ CLEAR CHAT (SYNC) ✅    */
/*****************************/
function clearChat(){  
  db.ref("chat").remove();  
  chat.innerHTML="";  
  cancelReply();  
  cancelEdit();  
}  

/* ===================================================== */
/* ✅✅✅ GAME MODE (مار و پله) — اضافه شد کامل ✅✅✅ */
/* ===================================================== */

const snakes = {
  16:6, 48:26, 49:11, 56:53,
  62:19, 64:60, 87:24,
  93:73, 95:75, 98:78
};

const ladders = {
  1:38, 4:14, 9:31,
  21:42, 28:84,
  36:44, 51:67,
  71:91, 80:100
};

const board = document.getElementById("board");
const gameBox = document.getElementById("gameBox");
const videoEl = document.getElementById("video");
const rollBtn = document.getElementById("rollDiceBtn");
const diceResult = document.getElementById("diceResult");
const resetBtn = document.getElementById("resetGameBtn");
const myRoleEl = document.getElementById("myRole");
const turnInfoEl = document.getElementById("turnInfo");

let myPlayer = null;

/* ساخت صفحه */
function createBoard(){
  if(!board) return;
  board.innerHTML = "";
  for(let i=100;i>=1;i--){
    const cell = document.createElement("div");
    cell.className="cell";
    cell.dataset.num=i;
    cell.innerText=i;
    board.appendChild(cell);
  }
}
createBoard();

/* حالت بازی اولیه */
function initGame(){
  db.ref("game/state").once("value", snap=>{
    if(!snap.exists()){
      db.ref("game/state").set({
        p1:1,
        p2:1,
        turn:"p1",
        winner:null,
        lastDice:0
      });
    }
  });
}

/* گرفتن نقش بازیکن (p1/p2) به صورت امن‌تر */
function claimPlayer(){
  const ref = db.ref("game/players/"+myId);

  ref.once("value").then(s=>{
    if(s.exists()){
      myPlayer = s.val();
      if(myRoleEl) myRoleEl.innerText = "نقش شما: " + myPlayer;
      return;
    }

    // اگر هنوز نقش نداره، بررسی کنیم p1/p2 پر هست یا نه
    db.ref("game/players").once("value").then(ps=>{
      const players = ps.val() || {};
      const used = Object.values(players);

      let role = null;
      if(!used.includes("p1")) role = "p1";
      else if(!used.includes("p2")) role = "p2";
      else role = "spectator";

      myPlayer = role;
      ref.set(role);
      ref.onDisconnect().remove();

      if(myRoleEl) myRoleEl.innerText = "نقش شما: " + myPlayer;
    });
  });
}

/* رندر مهره‌ها */
function renderTokens(p1Pos,p2Pos){
  document.querySelectorAll(".token").forEach(t=>t.remove());
  addToken(p1Pos,"p1");
  addToken(p2Pos,"p2");
}
function addToken(pos,cls){
  const cell = document.querySelector(`.cell[data-num='${pos}']`);
  if(!cell) return;
  const token = document.createElement("div");
  token.className="token "+cls;
  cell.appendChild(token);
}

/* دکمه روشن/خاموش گیم مود (سینک) */
document.getElementById("gameToggleBtn").onclick = function(){
  db.ref("game/mode").once("value").then(snap=>{
    let current = snap.val();
    if(current === null) current = false;
    db.ref("game/mode").set(!current);
  });
};

/* نمایش گیم مود یا ویدیو */
db.ref("game/mode").on("value", snap=>{
  let isGame = snap.val();
  if(isGame === null) isGame = false;

  const curtain = document.getElementById("curtain");

  if(isGame){
    // بازی
    videoEl.style.display="none";
    gameBox.style.display="flex";

    // ایموجی پنل ویدیو رو هم پنهان کن (اختیاری)
    try{ document.getElementById("videoReactPanel").style.display="none"; }catch(e){}
    try{ document.getElementById("videoReactBtn").style.display="none"; }catch(e){}

    if(curtain){
      curtain.classList.add("hide");
      curtain.classList.remove("open");
    }

    initGame();
    claimPlayer();
  }else{
    // ویدیو
    videoEl.style.display="block";
    gameBox.style.display="none";

    try{ document.getElementById("videoReactBtn").style.display="inline-block"; }catch(e){}

    if(curtain){
      curtain.classList.add("hide");
    }
  }
});

/* گوش دادن به state بازی */
db.ref("game/state").on("value", snap=>{
  const state = snap.val();
  if(!state) return;

  renderTokens(state.p1,state.p2);

  if(diceResult) diceResult.innerText = state.lastDice || 0;
  if(turnInfoEl) turnInfoEl.innerText = "نوبت: " + (state.turn || "-");

  if(state.winner){
    alert("🏆 برنده: "+state.winner);
  }
});

/* تاس انداختن */
rollBtn.onclick = ()=>{
  db.ref("game/state").once("value", snap=>{
    const state = snap.val();
    if(!state || state.winner) return;

    // اگر هنوز نقش معلوم نشده
    if(!myPlayer) return;

    // فقط p1/p2 می‌تونن بازی کنن
    if(myPlayer !== "p1" && myPlayer !== "p2") return;

    // نوبت
    if(state.turn !== myPlayer) return;

    let dice = Math.floor(Math.random()*6)+1;

    let newPos = state[myPlayer] + dice;
    if(newPos > 100) newPos = state[myPlayer]; // اگر بیشتر شد، همون‌جا بمونه

    if(snakes[newPos]) newPos = snakes[newPos];
    if(ladders[newPos]) newPos = ladders[newPos];

    let nextTurn = myPlayer==="p1"?"p2":"p1";
    let winner = newPos===100?myPlayer:null;

    db.ref("game/state").update({
      [myPlayer]:newPos,
      turn: nextTurn,
      winner: winner,
      lastDice: dice
    });
  });
};

/* ریست بازی */
resetBtn.onclick = ()=>{
  db.ref("game/state").set({
    p1:1,
    p2:1,
    turn:"p1",
    winner:null,
    lastDice:0
  });
};

</script>  

</body>
